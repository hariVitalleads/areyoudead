server:
  port: 8080
  servlet:
    context-path: /checkin

app:
  rate-limit:
    auth-requests-per-window: ${RATE_LIMIT_AUTH_REQUESTS:10}
    window-seconds: ${RATE_LIMIT_WINDOW_SECONDS:60}
  scheduler:
    inactive-ms: ${APP_SCHEDULER_INACTIVE_MS:86400000}
    # Hours between escalating to next contact (e.g. 24 = notify contact 2 after 24h if no check-in)
    escalation-interval-hours: ${APP_SCHEDULER_ESCALATION_INTERVAL_HOURS:24}
    emergency-contacts:
      sms:
        enabled: ${APP_SCHEDULER_EMERGENCY_CONTACTS_SMS_ENABLED:true}
      email:
        enabled: ${APP_SCHEDULER_EMERGENCY_CONTACTS_EMAIL_ENABLED:true}
  user:
    require-email-verification: ${USER_REQUIRE_EMAIL_VERIFICATION:true}
    verification-token-ttl-seconds: ${USER_VERIFICATION_TTL:86400}
  fcm:
    enabled: ${FCM_ENABLED:false}
    credentials-path: ${FCM_CREDENTIALS_PATH:}
    credentials-json-base64: ${FCM_CREDENTIALS_JSON_BASE64:}
  emergency-contacts:
    max-count: ${EMERGENCY_CONTACTS_MAX_COUNT:3}
    require-verification: ${EMERGENCY_CONTACTS_REQUIRE_VERIFICATION:true}
    verification-token-ttl-seconds: ${EMERGENCY_CONTACTS_VERIFICATION_TTL:86400}
    sms:
      enabled: ${EMERGENCY_CONTACTS_SMS_ENABLED:true}
    email:
      enabled: ${EMERGENCY_CONTACTS_EMAIL_ENABLED:true}
      from-address: ${EMERGENCY_CONTACTS_EMAIL_FROM:noreply@checkin.com}
      subject-prefix: ${EMERGENCY_CONTACTS_EMAIL_SUBJECT_PREFIX:[Checkin]}
      # Required for verification links in emails. Default supports local dev with context-path /checkin.
      app-base-url: ${APP_BASE_URL:http://localhost:8080/checkin}

spring:
  datasource:
    # options forces Postgres session to UTC; all TIMESTAMPTZ stored/read in UTC
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/areyoudead?options=-c%20TimeZone%3DUTC}
    username: ${SPRING_DATASOURCE_USERNAME:areyoudead}
    password: ${SPRING_DATASOURCE_PASSWORD:areyoudead}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
  # SMTP: defaults match MailHog (localhost:1025). For production, set:
  # MAIL_HOST, MAIL_PORT, MAIL_USERNAME, MAIL_PASSWORD, MAIL_SMTP_AUTH=true, MAIL_SMTP_STARTTLS=true
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:false}
          connectiontimeout: ${MAIL_CONNECTION_TIMEOUT:5000}
          writetimeout: ${MAIL_WRITE_TIMEOUT:5000}
          timeout: ${MAIL_TIMEOUT:5000}

logging:
  level:
    # Set to DEBUG to see generated email HTML in logs
    com.checkin.service.InactiveUserEmailTemplate: ${LOG_LEVEL_EMAIL_TEMPLATE:DEBUG}
    com.checkin.service.EmergencyContactService: ${LOG_LEVEL_EMERGENCY_CONTACT:DEBUG}

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      probes:
        enabled: true
  health:
    db:
      enabled: true
    mail:
      enabled: true

security:
  jwt:
    # IMPORTANT: override in env for anything beyond local dev.
    # Must be at least 32 bytes for HS256.
    secret: ${JWT_SECRET:dev-only-change-me-dev-only-change-me-123456}
    issuer: ${JWT_ISSUER:areyoudead}
    access-token-ttl-seconds: ${JWT_TTL_SECONDS:300}
    refresh-token-ttl-seconds: ${JWT_REFRESH_TTL_SECONDS:86400}
